version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: crowd_tracking_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: crowd_tracking_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ../:/app

  worker:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: crowd_tracking_worker
    env_file:
      - .env
    command: celery -A web.app.core.celery_app worker --loglevel=INFO -Q stream_queue,alert_queue,notification_queue,hardware_queue,stats_queue --concurrency=4
    depends_on:
      - redis
    volumes:
      - ../:/app
